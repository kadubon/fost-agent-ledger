name: Publish

on:
  release:
    types: ["published"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest
      - run: uv build
      - run: uv run python tools/audit_release.py dist
      - run: uv run python tools/check_package_metadata.py . dist
      - run: uv publish --trusted-publishing always
